<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل مخالفة سلوكية</title>

<style>
body{
    margin:0;
    font-family:Tahoma;
    background:#eef2f7;
}
.header{
    background:#1976d2;
    color:white;
    text-align:center;
    padding:18px;
    font-size:22px;
}
.container{
    max-width:500px;
    margin:25px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}
.info{
    background:#f4f6fa;
    padding:12px;
    border-radius:8px;
    margin-bottom:20px;
    text-align:center;
    font-size:18px;
}
select,input,textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    font-size:18px;
    border-radius:8px;
    border:1px solid #ccc;
}
textarea{
    min-height:80px;
}
button{
    width:100%;
    padding:14px;
    font-size:18px;
    background:#1976d2;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    opacity:.9;
}
</style>
</head>

<body>

<div class="header">
تسجيل مخالفة سلوكية
</div>
<div class="copyright-badge">
    © 2026 حامد العبيـدي  
</div>

<div class="container">

<div class="info" id="classInfo"></div>

<select id="student" multiple size="8"></select>

<!-- نوع السجل الرئيسي -->
<select id="mainType">
    <option value="">اختر نوع السجل</option>
    <option value="غياب">غياب</option>
    <option value="تأخر صباحي">تأخر صباحي</option>
    <option value="مخالفة سلوكية">مخالفة سلوكية</option>
</select>

<!-- قائمة المخالفات السلوكية (تظهر فقط عند الاختيار) -->
<select id="violationType" style="display:none;">
    <option value="">اختر نوع المخالفة</option>
    <option value="تنمر">تنمر</option>
    <option value="تشاجر">تشاجر</option>
    <option value="إزعاج داخل الفصل">إزعاج داخل الفصل</option>
    <option value="عدم إحضار الواجب">عدم إحضار الواجب</option>
    <option value="أخرى">أخرى</option>
</select>

<textarea id="description" placeholder="وصف إضافي (اختياري)"></textarea>

<input type="text" id="teacher" placeholder="اسم المعلم">

<button id="submitBtn">تسجيل السجل</button>

</div>

<script type="module">
    

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  serverTimestamp,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { studentsData } from "./students.js";

const firebaseConfig = {
  apiKey: "AIzaSyCw3XLws007fQ9Q-TegFGlf61OyryDxayo",
  authDomain: "discipline-school.firebaseapp.com",
  projectId: "discipline-school",
  storageBucket: "discipline-school.firebasestorage.app",
  messagingSenderId: "31107094996",
  appId: "1:31107094996:web:342a28d04f8bc1049cde41",
  measurementId: "G-JDJSHCHE9T"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const stage = params.get("stage");
const classNum = params.get("class");

document.getElementById("classInfo").innerText =
`المرحلة: ${stage} | الفصل: ${classNum}`;

const key = stage + "-" + classNum;
const students = studentsData[key] || [];

const studentSelect = document.getElementById("student");

const mainTypeSelect = document.getElementById("mainType");
const violationTypeSelect = document.getElementById("violationType");

/* إظهار قائمة المخالفات عند اختيار مخالفة سلوكية */
mainTypeSelect.addEventListener("change", () => {
    if(mainTypeSelect.value === "مخالفة سلوكية"){
        violationTypeSelect.style.display = "block";
    }else{
        violationTypeSelect.style.display = "none";
        violationTypeSelect.value = "";
    }
});

students.forEach(name=>{
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    studentSelect.appendChild(option);
});

/* =============================== */
/* منع تكرار التسجيل في نفس اليوم */
/* =============================== */

function getSchoolDayRange(){
    const now = new Date();
    let referenceDate = new Date(now);

    if(now.getHours() < 7 || (now.getHours() === 7 && now.getMinutes() < 30)){
        referenceDate.setDate(referenceDate.getDate() - 1);
    }

    const start = new Date(referenceDate);
    start.setHours(7,30,0,0);

    const end = new Date(referenceDate);
    end.setHours(13,10,0,0);

    return {start,end};
}

document.getElementById("submitBtn").addEventListener("click", async () => {

    const selectedOptions = [...studentSelect.selectedOptions];
    const selectedStudents = selectedOptions.map(opt => opt.value);

    console.log("نوع أول عنصر:", typeof selectedStudents[0]);
    console.log("القيمة:", selectedStudents[0]);

    const mainType = mainTypeSelect.value;
    const violationType = violationTypeSelect.value;

    const description = document.getElementById("description").value;
    const teacher = document.getElementById("teacher").value;

    if(selectedStudents.length === 0 || !teacher || !mainType){
        alert("يرجى اختيار طالب واحد على الأقل وكتابة اسم المعلم");
        return;
    }

    const {start,end} = getSchoolDayRange();
    let collectionName = "";
    let isAttendance = false;

    if(mainType === "غياب" || mainType === "تأخر صباحي"){
    collectionName = "attendance";
    isAttendance = true;
    }else{
    collectionName = "violations";
    }


    try {
const now = new Date();
const startOfDay = new Date(now.setHours(0,0,0,0));
const endOfDay = new Date(now.setHours(23,59,59,999));

 for (const studentName of selectedStudents) {

  // 🔹 منع التكرار فقط للغياب والتأخر
  if (isAttendance) {

    const now = new Date();
    const startOfDay = new Date();
    startOfDay.setHours(0, 0, 0, 0);

    const endOfDay = new Date();
    endOfDay.setHours(23, 59, 59, 999);

    const q = query(
      collection(db, "attendance"),
      where("student", "==", studentName),
      where("stage", "==", stage),
      where("classNum", "==", classNum),
      where("date", ">=", startOfDay),
      where("date", "<=", endOfDay)
    );

    const snapshot = await getDocs(q);

    if (!snapshot.empty) {
      alert(`⚠️ تم تسجيل ${studentName} مسبقًا اليوم`);
      continue;
    }
  }

  // 🔹 إنشاء البيانات
  let data = {
  student: studentName,
  teacher,
  stage,
  classNum,
  date: serverTimestamp()
};

if(isAttendance){
    data.status = mainType; // غياب أو تأخر
}else{
    if(!violationType){
        alert("يرجى اختيار نوع المخالفة السلوكية");
        return;
    }
    data.category = "مخالفة سلوكية";
    data.violationType = violationType;
    data.description = description;
}


  await addDoc(collection(db, collectionName), data);
}


alert("✅ تم التسجيل بنجاح");
location.reload();

} catch (error) {
    alert("حدث خطأ أثناء الحفظ");
    console.error(error);
}

});

</script>

</body>
</html>
